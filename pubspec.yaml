name: kmd_volt
description: "KMD Volt - Personal Password Manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Encryption & Security
  encrypt: ^5.0.3
  crypto: ^3.0.6
  pointycastle: ^3.9.1

  # Secure Storage (keystore-backed)
  flutter_secure_storage: ^9.2.4

  # Biometric Authentication
  local_auth: ^2.3.0

  # Database — plain sqflite; sensitive fields are AES-256 encrypted at the
  # Dart layer using a key stored in the Android Keystore via flutter_secure_storage.
  sqflite: ^2.3.3
  path: ^1.9.1

  # State Management
  provider: ^6.1.5

  # UUID generation
  uuid: ^4.5.1

  # File handling (for backup/restore)
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  share_plus: ^10.1.4


  # Push notifications & background work
  flutter_local_notifications: ^17.2.4
  workmanager: ^0.9.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/groups/
